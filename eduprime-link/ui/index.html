<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EduPrime Link</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9ff;
      color: #1e293b;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 18px 24px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #e8eaf0;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      color: #1e293b;
    }

    .logo-text span { color: #4A6CF7; }

    .version {
      font-size: 11px;
      color: #94a3b8;
      margin-left: auto;
    }

    .status-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
    }

    .status-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(74, 108, 247, 0.08), 0 1px 4px rgba(0, 0, 0, 0.06);
    }

    .status-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
    }

    .status-icon svg { width: 64px; height: 64px; }

    #status-title {
      font-size: 19px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    #status-desc {
      font-size: 14px;
      color: #64748b;
      line-height: 1.55;
    }

    #btn-retry {
      display: none;
      margin: 20px auto 0;
      padding: 10px 28px;
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    #btn-retry:hover { background: #dc2626; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }

    details {
      border-top: 1px solid #e8eaf0;
      flex-shrink: 0;
    }

    details summary {
      padding: 8px 20px;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      user-select: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      list-style: none;
    }

    details summary::-webkit-details-marker { display: none; }
    details summary::before { content: '▶  '; font-size: 8px; }
    details[open] summary::before { content: '▼  '; }

    #log-output {
      height: 130px;
      overflow-y: auto;
      background: #0f172a;
      padding: 10px 16px;
      font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
      font-size: 10px;
      line-height: 1.7;
      color: #94a3b8;
    }

    .log-info  { color: #64748b; }
    .log-warn  { color: #f59e0b; }
    .log-error { color: #ef4444; }
    .log-success { color: #22c55e; }
    .log-data  { color: #60a5fa; }
  </style>
</head>
<body>
  <header>
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="7" fill="#4A6CF7"/>
      <path d="M8 14l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text">EduPrime <span>Link</span></span>
    <span class="version" id="app-version">v2.0.0</span>
  </header>

  <div class="status-area">
    <div class="status-card">
      <div class="status-icon" id="status-icon"></div>
      <h2 id="status-title">Getting ready...</h2>
      <p id="status-desc">This only takes a moment.</p>
      <button id="btn-retry">Try Again</button>
    </div>
  </div>

  <details>
    <summary>Details</summary>
    <div id="log-output"></div>
  </details>

  <script src="ws-client.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
